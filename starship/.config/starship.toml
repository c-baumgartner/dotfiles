"$schema" = 'https://starship.rs/config-schema.json'

# Catppuccin Macchiato
palette = 'catppuccin_macchiato'

add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$nodejs$golang$rust$python\
$azure\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
read_only = " "
read_only_style = "red"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style = "bold mauve"
format = "[$symbol$branch]($style) "

[git_status]
style = "red"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_state]
style = "bold yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[nodejs]
symbol = " "
style = "green"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "teal"
format = "[$symbol($version )]($style)"

[rust]
symbol = " "
style = "peach"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "yellow"
format = '[$symbol($version )(\($virtualenv\) )]($style)'

# Work: shows active subscription only when `az` is logged in.
# On personal machines az is absent, so this stays hidden automatically.
[azure]
disabled = false
symbol = "󰠅 "
style = "blue"
format = "[$symbol($subscription)]($style) "

[cmd_duration]
min_time = 2000
style = "subtext0"
format = "[ $duration]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"
