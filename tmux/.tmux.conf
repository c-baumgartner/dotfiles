# =============================================================================
# General
# =============================================================================

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # true colour passthrough

set -g prefix C-a
unbind C-b
bind C-a send-prefix                # double C-a sends literal C-a to app

set -g mouse on
set -g history-limit 10000
set -g base-index 1                 # start windows at 1
setw -g pane-base-index 1           # start panes at 1
set -g renumber-windows on          # close window 2 of 1,2,3 → becomes 1,2
set -sg escape-time 0               # no delay on Esc (important for vim/nvim)
set -g focus-events on

# =============================================================================
# Key bindings
# =============================================================================

bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Intuitive splits (open in current path)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =============================================================================
# Copy mode (vi keys)
# =============================================================================

setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# =============================================================================
# Status bar — Catppuccin Mocha palette
# =============================================================================

clr_base="#1e1e2e"
clr_surface="#313244"
clr_overlay="#45475a"
clr_text="#cdd6f4"
clr_subtext="#a6adc8"
clr_mauve="#cba6f7"
clr_blue="#89b4fa"
clr_green="#a6e3a1"
clr_yellow="#f9e2af"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#{clr_base},fg=#{clr_text}"

set -g status-left-length 40
set -g status-left "#[bg=#{clr_mauve},fg=#{clr_base},bold] #S #[bg=#{clr_base},fg=#{clr_mauve}]"

set -g status-right-length 60
set -g status-right "#[fg=#{clr_overlay}]#[bg=#{clr_overlay},fg=#{clr_subtext}] %H:%M  %d %b #[bg=#{clr_surface},fg=#{clr_overlay}]#[bg=#{clr_surface},fg=#{clr_text}] #h "

set -g window-status-format "#[fg=#{clr_subtext}]  #I #W "
set -g window-status-current-format "#[fg=#{clr_base},bg=#{clr_blue}] #I #W #{?window_zoomed_flag, ,}"

set -g pane-border-style "fg=#{clr_overlay}"
set -g pane-active-border-style "fg=#{clr_blue}"

set -g message-style "bg=#{clr_surface},fg=#{clr_yellow}"
